<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="shortcut icon" href="IMG/favicon.ico" type="image/x-icon" />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<title>Jubs Libray | Cadastro</title>
	</head>
	<body
		class="font-['Poppins'] min-h-screen bg-gradient-to-br from-stone-50 via-amber-50 to-orange-100"
	>
		<header>
			<menu class="flex justify-between items-center px-6 py-2 shadow">
				<span class="flex items-center font-bold">
					<img
						class="w-16 h-auto"
						src="../IMG/icon-menu28.png"
						alt="simbolo de livro e xícara"
					/>
					<p>Jubs libray</p>
				</span>
				<nav>
					<ul class="flex gap-4 p-4 list-none text-black font-bold">
						<li>
							<!-- PAGINA INICIAL E DE CADASTRO -->
							<a
								href="../index.html"
								class="hover:scale-105 hover:underline underline-offset-8 decoration-2"
								>Home</a
							>
						</li>
						<li>
							<a
								href="cadastro.html"
								class="hover:scale-105 hover:underline underline-offset-8 decoration-2"
								>Cadastro</a
							>
						</li>
					</ul>
				</nav>
			</menu>
		</header>
		<main class="flex flex-col items-center justify-center">
			<h1 class="text-4xl text-center font-bold pt-4 pb-6">
				Cadastre seus Livros
			</h1>
			<form class="bg-white p-6 rounded-2xl shadow-lg w-96">
				<input
					type="text"
					placeholder="Link da capa do livro"
					class="w-full mb-3 p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-[#0F2A44]"
				/>
				<input
					type="text"
					placeholder="Título do livro"
					class="w-full mb-3 p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-[#0F2A44]"
				/>
				<input
					type="text"
					placeholder="Gênero"
					class="w-full mb-3 p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-[#0F2A44]"
				/>

				<input
					type="text"
					placeholder="Autor"
					class="w-full mb-3 p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-[#0F2A44]"
				/>

				<input
					type="number"
					placeholder="Preço"
					class="w-full mb-3 p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-[#0F2A44]"
				/>

				<button
					class="w-full bg-[#0F2A44] text-white p-3 rounded-xl hover:opacity-90"
				>
					Adicionar livro
				</button>
			</form>
		</main>
	</body>
</html>
